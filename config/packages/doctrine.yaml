doctrine:
    dbal:
        url: "%env(resolve:DATABASE_URL)%"

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: "%kernel.debug%"
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true

        mappings:
            App\Common\Presentation\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/Common/Presentation/Entity"
                prefix: 'App\Common\Presentation\Entity'

            App\Account\Domain\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/Account/Domain/Entity"
                prefix: 'App\Account\Domain\Entity'

            App\Organization\Domain\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/Organization/Domain/Entity"
                prefix: 'App\Organization\Domain\Entity'

            App\TrackManagement\Domain\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/TrackManagement/Domain/Entity"
                prefix: 'App\TrackManagement\Domain\Entity'

            App\ActivityHistory\Domain\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/ActivityHistory/Domain/Entity"
                prefix: 'App\ActivityHistory\Domain\Entity'

            App\ProjectManagement\Domain\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/ProjectManagement/Domain/Entity"
                prefix: 'App\ProjectManagement\Domain\Entity'

            App\MediaAssetManagement\Domain\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/MediaAssetManagement/Domain/Entity"
                prefix: 'App\MediaAssetManagement\Domain\Entity'

            App\FileImport\Domain\Entity:
                type: attribute
                is_bundle: false
                dir: "%kernel.project_dir%/src/FileImport/Domain/Entity"
                prefix: 'App\FileImport\Domain\Entity'

        controller_resolver:
            auto_mapping: false

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
